name: Deploy Next.js App to Vercel
on:
  push:
    branches:
      - production

jobs:
  web-deploy:
    name: 🎉 Deploy to Vercel
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Pull the latest code
      - name: 🚚 Get latest code
        uses: actions/checkout@v3

      # 2️⃣ Use Node.js 20.x (matching cPanel) try now
      - name: Use Node.js 20.x
        uses: actions/setup-node@v3
        with:
          node-version: "20.x"
          cache: "npm"

      # 3️⃣ Install dependencies (no build here — build will happen in cPanel)
      - name: Install dependencies
        run: npm install --legacy-peer-deps

      # 4️⃣ Upload the full project to cPanel
      - name: Sync Files
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_HOST }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          timeout: 60000   # 60 seconds
          local-dir: ./ # upload everything
          exclude: |
            **/.git*
            **/node_modules/**
            **/.next/cache/**
            **/npm-debug.log
            **/yarn-error.log
